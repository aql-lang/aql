# golangci-lint configuration (schema v2). Applies to all three Go modules
# in this repo — eng/go, lang, cmd/go — since golangci-lint walks up to the
# repo root to find this file. Run `make lint` (from lang/, eng/go/ or
# cmd/go/), which invokes `golangci-lint run ./...`.
#
# Deliberately conservative: the `standard` preset (errcheck, govet,
# ineffassign, staticcheck, unused) plus a few low-false-positive extras.
# Heavier or stylistic linters (gosec, revive, gocritic, nilerr, …) are
# left for opt-in / ad-hoc passes — see STATIC_ANALYSIS_REPORT.md.
version: "2"

linters:
  default: standard
  enable:
    - bodyclose   # HTTP response bodies must be closed (cmd/go does http.Get)
    - misspell    # common misspellings in comments and strings
    - unconvert   # redundant type conversions
  settings:
    errcheck:
      # Calls where ignoring the error is the established convention.
      exclude-functions:
        - (*database/sql.Tx).Rollback
        - (net/http.ResponseWriter).Write
        - (*encoding/json.Encoder).Encode
    staticcheck:
      # golangci-lint's default staticcheck set, plus drop the "QF"
      # quickfix *suggestions* (De Morgan rewrites, tagged-switch hints,
      # …) — fine in review, too noisy to gate CI on.
      checks:
        - all
        - -ST1000
        - -ST1003
        - -ST1016
        - -ST1020
        - -ST1021
        - -ST1022
        - -QF*
  exclusions:
    generated: lax
    presets:
      - common-false-positives
      - std-error-handling
    rules:
      # Test code routinely discards setup errors (os.WriteFile, os.Chdir,
      # os.Setenv, …) and the spec-runner fixtures intentionally discard
      # the always-nil error from already-type-matched AsX() accessors.
      - path: _test\.go
        linters:
          - errcheck
          - ineffassign
      # Parked / work-in-progress code carrying dead symbols (the query
      # builder rework, unit-aware string helpers, the await ordering
      # field). Tracked in STATIC_ANALYSIS_REPORT.md; re-enable `unused`
      # for these once the features land or the code is removed.
      - path: lang/engine/(native_query|query|native_string_helpers|native_temporal_await)\.go
        linters:
          - unused
      # aliases.go is a re-export shim that intentionally mirrors the
      # whole eng API; some aliases stay until a caller needs them.
      - path: lang/engine/aliases\.go
        linters:
          - unused

formatters:
  enable:
    - gofmt
