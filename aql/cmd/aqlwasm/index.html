<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AQL REPL</title>
<style>
  :root {
    --bg: #1e1e2e;
    --surface: #181825;
    --text: #cdd6f4;
    --subtext: #a6adc8;
    --green: #a6e3a1;
    --red: #f38ba8;
    --blue: #89b4fa;
    --mauve: #cba6f7;
    --border: #313244;
    --input-bg: #11111b;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
    font-size: 14px;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
  }
  header h1 { font-size: 16px; font-weight: 600; color: var(--mauve); }
  header span { font-size: 12px; color: var(--subtext); }
  #status {
    margin-left: auto;
    font-size: 12px;
    padding: 2px 8px;
    border-radius: 4px;
  }
  .status-loading { color: #fab387; }
  .status-ready { color: var(--green); }
  .status-error { color: var(--red); }
  #output {
    flex: 1;
    overflow-y: auto;
    padding: 16px 20px;
    white-space: pre-wrap;
    word-break: break-all;
  }
  .line { margin-bottom: 4px; }
  .line-input { color: var(--blue); }
  .line-result { color: var(--green); }
  .line-error { color: var(--red); }
  .line-info { color: var(--subtext); font-style: italic; }
  #input-row {
    display: flex;
    align-items: center;
    padding: 8px 20px 12px;
    border-top: 1px solid var(--border);
    background: var(--surface);
  }
  #input-row .prompt {
    color: var(--mauve);
    margin-right: 8px;
    font-size: 14px;
    flex-shrink: 0;
    user-select: none;
  }
  #input {
    flex: 1;
    background: var(--input-bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    font-family: inherit;
    font-size: 14px;
    padding: 8px 12px;
    outline: none;
  }
  #input:focus { border-color: var(--mauve); }
  #input:disabled { opacity: 0.5; }
</style>
</head>
<body>
<header>
  <h1>AQL REPL</h1>
  <span>concatenative query language</span>
  <span id="status" class="status-loading">loading wasm...</span>
</header>
<div id="output">
  <div class="line line-info">Loading AQL engine...</div>
</div>
<div id="input-row">
  <span class="prompt">&gt;&gt;</span>
  <input id="input" type="text" disabled autocomplete="off" spellcheck="false"
         placeholder="Loading...">
</div>
<script src="wasm_exec.js"></script>
<script>
(function() {
  const output = document.getElementById('output');
  const input = document.getElementById('input');
  const status = document.getElementById('status');
  const history = [];
  let historyIdx = -1;

  function addLine(cls, text) {
    const div = document.createElement('div');
    div.className = 'line ' + cls;
    div.textContent = text;
    output.appendChild(div);
    output.scrollTop = output.scrollHeight;
  }

  function clearOutput() {
    output.innerHTML = '';
  }

  // Load WASM
  const go = new Go();

  window.__aqlReady = function() {
    clearOutput();
    addLine('line-info', 'AQL Web REPL ready. Type expressions and press Enter.');
    addLine('line-info', 'Examples: 1 add 2  |  "hello" upper  |  def double [dup add]  |  5 double');
    status.textContent = 'ready';
    status.className = 'status-ready';
    input.disabled = false;
    input.placeholder = 'Enter AQL expression...';
    input.focus();
  };

  WebAssembly.instantiateStreaming(fetch('aql.wasm'), go.importObject)
    .then(result => {
      go.run(result.instance);
    })
    .catch(err => {
      // Fallback for servers that don't serve .wasm with correct MIME type
      fetch('aql.wasm')
        .then(resp => resp.arrayBuffer())
        .then(bytes => WebAssembly.instantiate(bytes, go.importObject))
        .then(result => go.run(result.instance))
        .catch(err2 => {
          status.textContent = 'error';
          status.className = 'status-error';
          addLine('line-error', 'Failed to load WASM: ' + err2.message);
        });
    });

  function evaluate(code) {
    addLine('line-input', '>> ' + code);
    try {
      const res = aqlEval(code);
      if (res.error) {
        addLine('line-error', '  error: ' + res.error);
      } else if (res.result) {
        addLine('line-result', res.result);
      }
    } catch(e) {
      addLine('line-error', '  error: ' + e.message);
    }
  }

  input.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
      const code = input.value.trim();
      if (!code) return;
      history.push(code);
      historyIdx = history.length;
      input.value = '';
      evaluate(code);
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      if (historyIdx > 0) {
        historyIdx--;
        input.value = history[historyIdx];
      }
    } else if (e.key === 'ArrowDown') {
      e.preventDefault();
      if (historyIdx < history.length - 1) {
        historyIdx++;
        input.value = history[historyIdx];
      } else {
        historyIdx = history.length;
        input.value = '';
      }
    }
  });
})();
</script>
</body>
</html>
