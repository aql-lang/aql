name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: lang/go.mod

      - name: Install golangci-lint
        # Replaces a previous `curl … install.sh | sh` to avoid piping
        # a remote script into the CI shell. The official action installs
        # via GitHub Actions' cached infrastructure.
        uses: golangci/golangci-lint-action@v6
        with:
          version: v2.5.0
          install-mode: binary
          # We invoke golangci-lint via `make lint` below; this step
          # only needs to put the binary on $PATH.
          args: --version

      - name: Install govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Build CLI
        run: make -C cmd/go build

      - name: Vet
        run: make -C lang vet

      - name: Lint assertions
        run: make -C lang lint-assertions

      - name: Lint (golangci-lint)
        run: make -C lang lint

      - name: Test
        run: make -C lang test

      - name: Build WASM
        run: make -C cmd/go wasm

      # Advisory: govulncheck currently flags Go standard-library vulns
      # that are fixed in newer 1.24.x patch releases — see
      # STATIC_ANALYSIS_REPORT.md. Drop continue-on-error once the `go`
      # directive is bumped (or CI installs the latest 1.24.x toolchain).
      - name: Vulncheck (advisory)
        run: make -C lang vuln
        continue-on-error: true
