name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: lang/go.mod

      - name: Build CLI
        run: make -C cmd/go build

      - name: Vet
        run: make -C lang vet

      - name: Lint assertions
        run: make -C lang lint-assertions

      - name: Test
        run: make -C lang test

      - name: Build WASM
        run: make -C cmd/go wasm
