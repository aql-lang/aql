<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, interactive-widget=resizes-content">
<title>AQL REPL</title>
<style>
  :root {
    --bg: #1e1e2e;
    --surface: #181825;
    --text: #cdd6f4;
    --subtext: #a6adc8;
    --green: #a6e3a1;
    --red: #f38ba8;
    --blue: #89b4fa;
    --mauve: #cba6f7;
    --border: #313244;
    --input-bg: #11111b;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html {
    height: 100%;
    overflow: hidden;
  }
  body {
    height: 100%;
    overflow: hidden;
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
    font-size: 14px;
    display: flex;
    flex-direction: column;
  }
  header {
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }
  header h1 { font-size: 16px; font-weight: 600; color: var(--mauve); }
  header .subtitle { font-size: 12px; color: var(--subtext); }
  #status {
    margin-left: auto;
    font-size: 12px;
    padding: 2px 8px;
    border-radius: 4px;
    flex-shrink: 0;
  }
  .status-loading { color: #fab387; }
  .status-ready { color: var(--green); }
  .status-error { color: var(--red); }
  #output {
    flex: 1 1 0;
    min-height: 0;
    overflow-y: auto;
    padding: 12px 16px;
    white-space: pre-wrap;
    word-break: break-word;
    -webkit-overflow-scrolling: touch;
    overscroll-behavior: contain;
  }
  .line { margin-bottom: 4px; }
  .line-input { color: var(--blue); }
  .line-result { color: var(--green); }
  .line-error { color: var(--red); }
  .line-info { color: var(--subtext); font-style: italic; }
  #input-area {
    display: flex;
    align-items: flex-start;
    padding: 8px 16px;
    padding-bottom: max(8px, env(safe-area-inset-bottom));
    border-top: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
    gap: 8px;
  }
  #input-area .prompt {
    color: var(--mauve);
    font-size: 14px;
    flex-shrink: 0;
    user-select: none;
    line-height: 1.5;
    padding-top: 8px;
  }
  #input {
    flex: 1;
    background: var(--input-bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    font-family: inherit;
    font-size: 14px;
    padding: 8px 12px;
    outline: none;
    resize: none;
    overflow-y: auto;
    line-height: 1.5;
    min-height: calc(1.5em + 18px);
    max-height: 40vh;
  }
  #input:focus { border-color: var(--mauve); }
  #input:disabled { opacity: 0.5; }
  #run-btn {
    flex-shrink: 0;
    background: var(--mauve);
    color: var(--bg);
    border: none;
    border-radius: 4px;
    font-family: inherit;
    font-size: 14px;
    font-weight: 600;
    padding: 8px 14px;
    cursor: pointer;
    align-self: flex-end;
    line-height: 1.5;
  }
  #run-btn:active { opacity: 0.8; }
  #run-btn:disabled { opacity: 0.4; cursor: default; }
  .hint {
    font-size: 11px;
    color: var(--subtext);
    padding: 4px 16px 0;
    background: var(--surface);
    flex-shrink: 0;
  }

  @media (max-width: 600px) {
    body { font-size: 13px; }
    header { padding: 8px 12px; gap: 6px; }
    header h1 { font-size: 15px; }
    header .subtitle { display: none; }
    #output { padding: 10px 12px; }
    #input-area { padding: 8px 12px; padding-bottom: max(8px, env(safe-area-inset-bottom)); }
    #input { font-size: 16px; /* prevent iOS zoom */ }
    .hint { padding: 4px 12px 0; }
  }
</style>
</head>
<body>
<header>
  <h1>AQL REPL</h1>
  <span class="subtitle">concatenative query language</span>
  <span id="status" class="status-loading">loading wasm...</span>
</header>
<div id="output">
  <div class="line line-info">Loading AQL engine...</div>
</div>
<div class="hint" id="hint"></div>
<div id="input-area">
  <span class="prompt">&gt;&gt;</span>
  <textarea id="input" rows="3" disabled autocomplete="off" autocorrect="off"
            autocapitalize="off" spellcheck="false"
            placeholder="Loading..."></textarea>
  <button id="run-btn" disabled>Run</button>
</div>
<script src="wasm_exec.js"></script>
<script>
(function() {
  const output = document.getElementById('output');
  const input = document.getElementById('input');
  const status = document.getElementById('status');
  const runBtn = document.getElementById('run-btn');
  const hint = document.getElementById('hint');
  const history = [];
  let historyIdx = -1;
  let ready = false;

  const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
  hint.textContent = isMobile
    ? 'Enter for newline, tap Run to evaluate'
    : 'Shift+Enter for newline, Enter to evaluate';

  // --- Viewport resize handling for mobile keyboards ---
  function updateLayout() {
    if (window.visualViewport) {
      var vh = window.visualViewport.height;
      document.body.style.height = vh + 'px';
    } else {
      document.body.style.height = window.innerHeight + 'px';
    }
    scrollOutput();
  }

  if (window.visualViewport) {
    window.visualViewport.addEventListener('resize', updateLayout);
    window.visualViewport.addEventListener('scroll', updateLayout);
  }
  window.addEventListener('resize', updateLayout);
  updateLayout();

  // --- Output helpers ---
  function scrollOutput() {
    requestAnimationFrame(function() {
      output.scrollTop = output.scrollHeight;
    });
  }

  function addLine(cls, text) {
    var div = document.createElement('div');
    div.className = 'line ' + cls;
    div.textContent = text;
    output.appendChild(div);
    scrollOutput();
  }

  function clearOutput() {
    output.innerHTML = '';
  }

  function autoResize() {
    input.style.height = 'auto';
    var maxH = (window.visualViewport ? window.visualViewport.height : window.innerHeight) * 0.3;
    input.style.height = Math.min(input.scrollHeight, maxH) + 'px';
  }

  function submit() {
    if (!ready) return;
    var code = input.value.trim();
    if (!code) return;
    history.push(code);
    historyIdx = history.length;
    input.value = '';
    autoResize();
    evaluate(code);
    input.focus();
  }

  // Load WASM
  var go = new Go();

  window.__aqlReady = function() {
    ready = true;
    clearOutput();
    addLine('line-info', 'AQL Web REPL ready. Type expressions and press Enter.');
    addLine('line-info', 'Examples: 1 add 2  |  "hello" upper  |  def double [dup add]  |  5 double');
    status.textContent = 'ready';
    status.className = 'status-ready';
    input.disabled = false;
    runBtn.disabled = false;
    input.placeholder = 'Enter AQL expression...';
    input.focus();
  };

  WebAssembly.instantiateStreaming(fetch('aql.wasm'), go.importObject)
    .then(function(result) {
      go.run(result.instance);
    })
    .catch(function(err) {
      fetch('aql.wasm')
        .then(function(resp) { return resp.arrayBuffer(); })
        .then(function(bytes) { return WebAssembly.instantiate(bytes, go.importObject); })
        .then(function(result) { go.run(result.instance); })
        .catch(function(err2) {
          status.textContent = 'error';
          status.className = 'status-error';
          addLine('line-error', 'Failed to load WASM: ' + err2.message);
        });
    });

  function evaluate(code) {
    var display = code.includes('\n') ? code.replace(/\n/g, ' \u21b5 ') : code;
    addLine('line-input', '>> ' + display);
    try {
      var res = aqlEval(code);
      if (res.error) {
        addLine('line-error', '  error: ' + res.error);
      } else if (res.result) {
        addLine('line-result', res.result);
      }
    } catch(e) {
      addLine('line-error', '  error: ' + e.message);
    }
  }

  input.addEventListener('input', autoResize);

  input.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey && !isMobile) {
      e.preventDefault();
      submit();
    } else if (e.key === 'ArrowUp' && input.selectionStart === 0 && !e.shiftKey) {
      e.preventDefault();
      if (historyIdx > 0) {
        historyIdx--;
        input.value = history[historyIdx];
        autoResize();
      }
    } else if (e.key === 'ArrowDown' && input.selectionStart === input.value.length && !e.shiftKey) {
      e.preventDefault();
      if (historyIdx < history.length - 1) {
        historyIdx++;
        input.value = history[historyIdx];
      } else {
        historyIdx = history.length;
        input.value = '';
      }
      autoResize();
    }
  });

  runBtn.addEventListener('click', submit);
})();
</script>
</body>
</html>
